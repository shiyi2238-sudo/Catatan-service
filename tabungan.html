<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Savings Tracker</title>
    <style>
        /* CSS: MODERN DARK THEME */
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --primary: #38bdf8;
            --success: #22c55e;
            --danger: #ef4444;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --accent-gold: #fbbf24;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        /* DASHBOARD SECTION */
        .dashboard {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            padding: 25px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            text-align: center;
        }

        .dashboard h1 { font-size: 0.9rem; text-transform: uppercase; color: var(--text-dim); letter-spacing: 2px; }
        .dashboard .total-balance { font-size: 2.5rem; font-weight: 700; margin: 10px 0; color: var(--primary); }
        .dashboard .stats-summary { display: flex; justify-content: space-around; margin-top: 15px; font-size: 0.85rem; }
        .stat-item span { display: block; color: var(--text-dim); }
        .stat-item b { color: var(--text-main); }

        /* CATEGORY CARDS */
        .category-card {
            background: var(--card-bg);
            border-radius: 18px;
            padding: 20px;
            margin-bottom: 20px;
            position: relative;
            transition: transform 0.2s, box-shadow 0.2s;
            border-left: 6px solid var(--primary);
        }

        .category-card:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(0,0,0,0.4); }

        .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 15px; }
        .card-title h3 { font-size: 1.2rem; margin-bottom: 4px; }
        .card-title p { font-size: 0.8rem; color: var(--text-dim); }

        /* PROGRESS BAR */
        .progress-container { background: rgba(255,255,255,0.1); height: 12px; border-radius: 10px; margin: 15px 0; overflow: hidden; }
        .progress-bar { height: 100%; width: 0%; border-radius: 10px; transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1); }

        .card-footer { display: flex; justify-content: space-between; font-size: 0.85rem; margin-top: 10px; }
        .remainder { color: var(--accent-gold); font-weight: 600; }

        /* BUTTONS */
        .btn-group { display: flex; gap: 8px; margin-top: 15px; }
        button { 
            padding: 10px 16px; border: none; border-radius: 10px; cursor: pointer; 
            font-weight: 600; font-size: 0.85rem; transition: opacity 0.2s;
        }
        button:active { transform: scale(0.95); }
        .btn-add-fund { background: var(--success); color: white; flex: 2; }
        .btn-edit { background: rgba(255,255,255,0.1); color: var(--text-main); }
        .btn-delete { background: rgba(239, 68, 68, 0.15); color: var(--danger); }
        .btn-main-add { 
            width: 100%; padding: 18px; background: var(--primary); color: #000; 
            font-size: 1rem; border-radius: 15px; margin-bottom: 30px; font-weight: 800;
        }

        /* MODAL SYSTEM */
        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 1000;
            backdrop-filter: blur(5px);
        }
        .modal-content { background: var(--card-bg); padding: 25px; border-radius: 20px; width: 90%; max-width: 400px; }
        .modal-header { margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 8px; font-size: 0.85rem; color: var(--text-dim); }
        input { 
            width: 100%; padding: 12px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1); 
            background: rgba(0,0,0,0.2); color: white; outline: none; font-size: 1rem;
        }
        input:focus { border-color: var(--primary); }

        .empty-state { text-align: center; color: var(--text-dim); padding: 50px 0; }
        .history-list { font-size: 0.75rem; color: var(--text-dim); margin-top: 10px; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 10px; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="container">
    <!-- DASHBOARD -->
    <div class="dashboard">
        <h1>Total Tabungan</h1>
        <div class="total-balance" id="grand-total">Rp 0</div>
        <div class="stats-summary">
            <div class="stat-item"><span id="total-target-label">Total Target</span><b id="grand-target">Rp 0</b></div>
            <div class="stat-item"><span>Progress</span><b id="grand-percent">0%</b></div>
        </div>
    </div>

    <button class="btn-main-add" onclick="openModal('categoryModal')">+ TAMBAH TARGET BARU</button>

    <!-- CATEGORY LIST -->
    <div id="category-container">
        <!-- Rendered by JS -->
    </div>

    <div style="text-align: center; margin-top: 40px;">
        <button onclick="resetAllData()" style="background: none; color: var(--danger); text-decoration: underline; font-size: 0.7rem;">RESET SEMUA DATA</button>
    </div>
</div>

<!-- MODAL: ADD/EDIT CATEGORY -->
<div class="modal" id="categoryModal">
    <div class="modal-content">
        <div class="modal-header"><h2 id="modalTitle">Tambah Target</h2></div>
        <input type="hidden" id="edit-id">
        <div class="form-group">
            <label>Nama Kategori</label>
            <input type="text" id="cat-name" placeholder="Contoh: Beli Motor">
        </div>
        <div class="form-group">
            <label>Target Uang (Rp)</label>
            <input type="number" id="cat-target" placeholder="3000000">
        </div>
        <div class="form-group">
            <label>Catatan (Opsional)</label>
            <input type="text" id="cat-note" placeholder="Warna Merah / Target Desember">
        </div>
        <div class="btn-group">
            <button onclick="closeModal('categoryModal')" class="btn-edit">Batal</button>
            <button onclick="saveCategory()" class="btn-add-fund">Simpan</button>
        </div>
    </div>
</div>

<!-- MODAL: MANAGE FUNDS -->
<div class="modal" id="fundModal">
    <div class="modal-content">
        <div class="modal-header"><h2>Update Saldo</h2><p id="fund-cat-name" style="font-size: 0.8rem; color: var(--primary);"></p></div>
        <input type="hidden" id="fund-id">
        <div class="form-group">
            <label>Jumlah Uang (Rp)</label>
            <input type="number" id="fund-amount" placeholder="Gunakan tanda minus (-) untuk pengeluaran">
        </div>
        <p style="font-size: 0.7rem; color: var(--text-dim); margin-bottom: 15px;">Tips: Masukkan angka positif untuk menabung, negatif untuk mengambil.</p>
        <div class="btn-group">
            <button onclick="closeModal('fundModal')" class="btn-edit">Batal</button>
            <button onclick="updateBalance()" class="btn-add-fund">Update Saldo</button>
        </div>
    </div>
</div>

<script>
    // JS LOGIC: STATE MANAGEMENT
    let categories = JSON.parse(localStorage.getItem('elite_savings_data')) || [];

    // Format Number to IDR
    const formatRp = (num) => {
        return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(num);
    };

    // Save to LocalStorage
    const saveData = () => {
        localStorage.setItem('elite_savings_data', JSON.stringify(categories));
        renderAll();
    };

    // Modal Handlers
    function openModal(id, catId = null) {
        document.getElementById(id).style.display = 'flex';
        if(catId) {
            const cat = categories.find(c => c.id === catId);
            if(id === 'categoryModal') {
                document.getElementById('modalTitle').innerText = "Edit Target";
                document.getElementById('edit-id').value = cat.id;
                document.getElementById('cat-name').value = cat.name;
                document.getElementById('cat-target').value = cat.target;
                document.getElementById('cat-note').value = cat.note;
            } else if(id === 'fundModal') {
                document.getElementById('fund-id').value = cat.id;
                document.getElementById('fund-cat-name').innerText = cat.name;
            }
        } else {
            // Reset fields for new category
            document.getElementById('modalTitle').innerText = "Tambah Target";
            document.getElementById('edit-id').value = "";
            document.getElementById('cat-name').value = "";
            document.getElementById('cat-target').value = "";
            document.getElementById('cat-note').value = "";
        }
    }

    function closeModal(id) {
        document.getElementById(id).style.display = 'none';
    }

    // CRUD: Save Category
    function saveCategory() {
        const id = document.getElementById('edit-id').value;
        const name = document.getElementById('cat-name').value;
        const target = parseFloat(document.getElementById('cat-target').value);
        const note = document.getElementById('cat-note').value;

        if(!name || !target) return alert("Nama dan Target wajib diisi!");

        if(id) {
            // Edit existing
            const index = categories.findIndex(c => c.id == id);
            categories[index] = { ...categories[index], name, target, note };
        } else {
            // Create new
            const newCat = {
                id: Date.now(),
                name,
                target,
                balance: 0,
                note,
                color: `hsl(${Math.random() * 360}, 70%, 60%)`,
                history: []
            };
            categories.push(newCat);
        }

        closeModal('categoryModal');
        saveData();
    }

    // UPDATE: Balance
    function updateBalance() {
        const id = document.getElementById('fund-id').value;
        const amount = parseFloat(document.getElementById('fund-amount').value);
        
        if(isNaN(amount)) return alert("Masukkan jumlah yang valid!");

        const index = categories.findIndex(c => c.id == id);
        const oldBalance = categories[index].balance;
        categories[index].balance += amount;
        
        // Add to history
        categories[index].history.push({
            date: new Date().toLocaleDateString('id-ID'),
            amount: amount
        });

        // Limit history to last 3 entries
        if(categories[index].history.length > 3) categories[index].history.shift();

        // Bonus: Notification
        if(categories[index].balance >= categories[index].target && oldBalance < categories[index].target) {
            alert(`🎉 Selamat! Target "${categories[index].name}" telah tercapai!`);
        }

        document.getElementById('fund-amount').value = "";
        closeModal('fundModal');
        saveData();
    }

    // DELETE
    function deleteCategory(id) {
        if(confirm("Hapus kategori ini beserta semua datanya?")) {
            categories = categories.filter(c => c.id !== id);
            saveData();
        }
    }

    function resetAllData() {
        if(confirm("⚠️ PERINGATAN: Hapus SEMUA data tabungan Anda? Tindakan ini tidak bisa dibatalkan.")) {
            categories = [];
            saveData();
        }
    }

    // RENDERING LOGIC
    function renderAll() {
        const container = document.getElementById('category-container');
        const grandTotalEl = document.getElementById('grand-total');
        const grandTargetEl = document.getElementById('grand-target');
        const grandPercentEl = document.getElementById('grand-percent');

        container.innerHTML = "";
        let totalAllBalance = 0;
        let totalAllTarget = 0;

        if(categories.length === 0) {
            container.innerHTML = `<div class="empty-state">Belum ada target tabungan.<br>Klik tombol biru di atas untuk memulai.</div>`;
        }

        categories.forEach(cat => {
            const percent = Math.min((cat.balance / cat.target) * 100, 100).toFixed(1);
            const sisa = Math.max(cat.target - cat.balance, 0);
            
            totalAllBalance += cat.balance;
            totalAllTarget += cat.target;

            const card = document.createElement('div');
            card.className = "category-card";
            card.style.borderLeftColor = cat.color;
            card.innerHTML = `
                <div class="card-header">
                    <div class="card-title">
                        <h3>${cat.name}</h3>
                        <p>${cat.note || 'Tanpa catatan'}</p>
                    </div>
                    <div style="text-align: right">
                        <b style="color: var(--primary)">${percent}%</b>
                    </div>
                </div>
                
                <div style="font-size: 0.9rem;">
                    <b>${formatRp(cat.balance)}</b> <span style="color: var(--text-dim)">/ ${formatRp(cat.target)}</span>
                </div>

                <div class="progress-container">
                    <div class="progress-bar" style="width: ${percent}%; background-color: ${cat.color}"></div>
                </div>

                <div class="card-footer">
                    <span class="remainder">${sisa <= 0 ? '✅ TARGET TERCAPAI' : 'Sisa: ' + formatRp(sisa)}</span>
                </div>

                <div class="history-list">
                    Last activity: ${cat.history.length > 0 ? cat.history[cat.history.length-1].date + " (" + (cat.history[cat.history.length-1].amount > 0 ? '+' : '') + formatRp(cat.history[cat.history.length-1].amount) + ")" : 'No transactions'}
                </div>

                <div class="btn-group">
                    <button class="btn-add-fund" onclick="openModal('fundModal', ${cat.id})">UPDATE SALDO</button>
                    <button class="btn-edit" onclick="openModal('categoryModal', ${cat.id})">EDIT</button>
                    <button class="btn-delete" onclick="deleteCategory(${cat.id})">HAPUS</button>
                </div>
            `;
            container.appendChild(card);
        });

        // Update Dashboard
        grandTotalEl.innerText = formatRp(totalAllBalance);
        grandTargetEl.innerText = formatRp(totalAllTarget);
        const grandPercent = totalAllTarget > 0 ? ((totalAllBalance / totalAllTarget) * 100).toFixed(1) : 0;
        grandPercentEl.innerText = grandPercent + "%";
    }

    // Initial Load
    renderAll();
</script>

</body>
</html>
